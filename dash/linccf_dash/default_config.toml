# Default DASH pipeline configuration.
# Shipped with the package and applied as the base for every run.
# Your run config is merged on top — only specify what differs.

# ---------------------------------------------------------------------------
# Dask client
# ---------------------------------------------------------------------------

[dask]
threads_per_worker = 1
n_workers    = 16
memory_limit = "16GB"

[dask.stages.nesting]
n_workers    = 8
memory_limit = "32GB"

[dask.stages.crossmatch]
n_workers    = 8
memory_limit = "128GB"

# ---------------------------------------------------------------------------
# Stages
# ---------------------------------------------------------------------------

[stages]
enabled = [
    "butler",
    "raw_sizes",
    "import",
    "postprocess",
    "nesting",
    "collections",
    "generate_json",
]

# ---------------------------------------------------------------------------
# Catalogs
# ---------------------------------------------------------------------------

[catalogs]
enabled = [
    "dia_object",
    "dia_source",
    "dia_object_forced_source",
    "object",
    "source",
    "object_forced_source",
]

[catalogs.dia_object]
dims             = ["tract"]
group_by         = ["tract"]
flux_columns     = []
add_mjds         = false
use_schema_file  = true
chunksize        = 500_000

[catalogs.dia_object.import_args]
ra_column        = "ra"
dec_column       = "dec"
catalog_type     = "object"
pixel_threshold  = 5_000_000
simple_progress_bar = true
resume           = true

[catalogs.dia_source]
dims             = ["tract"]
group_by         = ["tract"]
flux_columns     = ["psf", "science"]
add_mjds         = false
use_schema_file  = false
chunksize        = 500_000

[catalogs.dia_source.import_args]
ra_column        = "ra"
dec_column       = "dec"
catalog_type     = "source"
pixel_threshold  = 4_000_000
simple_progress_bar = true
resume           = true

[catalogs.dia_object_forced_source]
dims             = ["patch", "tract"]
group_by         = ["tract"]
flux_columns     = ["psf"]
add_mjds         = true
use_schema_file  = false
chunksize        = 500_000

[catalogs.dia_object_forced_source.import_args]
ra_column        = "coord_ra"
dec_column       = "coord_dec"
catalog_type     = "source"
pixel_threshold  = 25_000_000
simple_progress_bar = true
resume           = true

[catalogs.object]
dims             = ["tract"]
group_by         = ["tract"]
flux_columns     = [
    "u_psf", "u_kron",
    "g_psf", "g_kron",
    "r_psf", "r_kron",
    "i_psf", "i_kron",
    "z_psf", "z_kron",
    "y_psf", "y_kron",
]
add_mjds         = false
use_schema_file  = true
chunksize        = 250_000

[catalogs.object.import_args]
ra_column        = "coord_ra"
dec_column       = "coord_dec"
catalog_type     = "object"
pixel_threshold  = 300_000
simple_progress_bar = true
resume           = true

[catalogs.source]
dims             = ["band", "day_obs", "physical_filter", "visit"]
group_by         = ["band", "day_obs"]
flux_columns     = ["psf"]
add_mjds         = true
use_schema_file  = false
chunksize        = 500_000

[catalogs.source.import_args]
ra_column        = "ra"
dec_column       = "dec"
catalog_type     = "source"
pixel_threshold  = 1_000_000
simple_progress_bar = true
resume           = true

[catalogs.object_forced_source]
dims             = ["patch", "tract"]
group_by         = ["tract"]
flux_columns     = ["psf"]
add_mjds         = true
use_schema_file  = false
chunksize        = 500_000

[catalogs.object_forced_source.import_args]
ra_column        = "coord_ra"
dec_column       = "coord_dec"
catalog_type     = "source"
pixel_threshold  = 25_000_000
simple_progress_bar = true
resume           = true

