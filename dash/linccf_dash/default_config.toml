# ---------------------------------------------------------------------------
# Collections
# ---------------------------------------------------------------------------

[collections.dia_object_collection]
nested_catalog   = "dia_object_lc"
margin_threshold = 5.0
index_column     = "diaObjectId"

[collections.object_collection]
nested_catalog   = "object_lc"
margin_threshold = 5.0
index_column     = "objectId"

# ---------------------------------------------------------------------------
# Crossmatch surveys
# ---------------------------------------------------------------------------

[crossmatch.surveys.ztf_dr22]
path           = "https://data.lsdb.io/hats/ztf_dr22"
radius_arcsec  = 0.2
n_neighbors    = 20
suffix         = "_ztf"
join_id_column = "objectid"

[crossmatch.surveys.ps1]
path            = "s3://stpubdata/panstarrs/ps1/public/hats/otmo"
radius_arcsec   = 0.2
n_neighbors     = 20
suffix          = "_ps1"
join_id_column  = "objID"
s3_endpoint_url = "https://s3.amazonaws.com"
s3_anon         = true
